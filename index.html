<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Istirahat Operator Rancaekek 2 DC</title>
  <style>
    body { font-family:'Segoe UI', Calibri, sans-serif; margin:0; background:#0d0d0d; color:#f5f5f5; font-size:16px; }
    .header { width:100%; background:linear-gradient(90deg,#1a1a1a,#333); padding:20px 50px; border-bottom:2px solid #bfa64b; font-size:20px; font-weight:bold; display:flex; justify-content:space-between; color:#f5d000; box-shadow:0 4px 10px rgba(0,0,0,0.7); box-sizing:border-box; }
    .header-right { display:flex; gap:15px; align-items:center; padding-right:50px; box-sizing:border-box; }
    button { padding:10px 20px; font-size:16px; border-radius:10px; border:none; cursor:pointer; font-weight:bold; transition:all 0.3s ease; box-shadow:0 4px 6px rgba(0,0,0,0.5); color:#fff; }
    button:focus { outline:3px solid #f5d000; }
    #btnDownloadTemplate { background-color:#bfa64b; }
    #btnDownloadTemplate:hover { background-color:#e6c94d; }
    #btnDownloadRekap { background-color:#d4af37; color:#000; }
    #btnDownloadRekap:hover { background-color:#ffd700; }
    #btnResetData { background-color:#b00000; color:#fff; }
    #btnResetData:hover { background-color:#e60000; }
    #btnCari { background-color:#1e90ff; }
    #btnCari:hover { background-color:#3aa0ff; }
    #btnFilterOverBatas { background-color:#ff8c00; }
    #btnFilterOverBatas:hover { background-color:#ffa500; }
    .container { display:flex; height:calc(100vh - 80px); }
    .left, .right { flex:1; padding:50px; display:flex; flex-direction:column; }
    .left { background:#1a1a1a; border-right:2px solid #bfa64b; }
    input[type=text] { padding:14px; width:100%; border-radius:10px; border:1px solid #555; background:#0d0d0d; color:#f5f5f5; font-size:16px; }
    .notification { margin-top:15px; font-size:15px; color:#ffd700; min-height:40px; white-space:pre-wrap; font-weight:bold; background:#333; border-radius:8px; padding:10px 15px; border:1px solid #bfa64b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5); }
    .status { margin-top:25px; font-size:16px; line-height:1.8; }
    .table-header-bar { display:flex; justify-content:flex-end; align-items:center; gap:12px; margin-bottom:10px; padding-right:50px; box-sizing:border-box; }
    .table-header-bar input[type=text] { max-width:250px; }
    table { width:100%; border-collapse:collapse; font-size:14px; margin-top:5px; color:#f5f5f5; background:#1a1a1a; }
    table, th, td { border:1px solid #bfa64b; }
    th { padding:10px; text-align:left; background:#333; color:#ffd700; }
    td { padding:8px; text-align:left; background:#1a1a1a; }
    tr:hover td { background:#2a2a2a; }
    h3 { color:#ffd700; font-weight:bold; margin-bottom:15px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">Istirahat Operator Rancaekek 2 DC</div>
    <div class="header-right">
      <button id="btnDownloadTemplate" title="Download Template Excel">Download Template</button>
      <button id="btnDownloadRekap" title="Download Rekap Excel">Download Rekap</button>
      <button id="btnResetData" title="Reset Daftar Istirahat">Reset Daftar</button>
    </div>
  </div>

  <div class="container">
    <div class="left">
      <label for="barcode">Scan OpsID</label>
      <input type="text" id="barcode" placeholder="Scan di sini..." autofocus autocomplete="off" />
      <div class="notification" id="notification"></div>
      <div class="status" id="status">Status: Menunggu scan</div>
    </div>

    <div class="right">
      <div class="table-header-bar">
        <input type="text" id="searchInput" placeholder="Cari OpsID atau Nama..." />
        <button id="btnCari">Cari</button>
        <button id="btnFilterOverBatas" title="Tampilkan operator > 1 jam 10 menit">Filter > 1 jam 10 menit</button>
      </div>
      <h3>Daftar Operator Istirahat</h3>
      <table id="rekapTable" aria-label="Daftar rekap operator">
        <thead>
          <tr>
            <th>OpsID</th>
            <th>Nama</th>
            <th>Contract</th>
            <th>Status</th>
            <th>Mulai</th>
            <th>Selesai</th>
            <th>Durasi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script>
    // =================== CONFIG ===================
    const API_URL = "MASUKAN_LINK_WEB_APP_GOOGLE_APPS_SCRIPT"; // ganti dengan link Web App Apps Script kamu
    const batasDetik = 3900;

    let databaseOperator = {}, dataUser = {}, filterText = '';

    function formatTime(d){ return d.toTimeString().slice(0,8); }
    function formatDurasi(s){ return [Math.floor(s/3600).toString().padStart(2,'0'), Math.floor((s%3600)/60).toString().padStart(2,'0'), (s%60).toString().padStart(2,'0')].join(':'); }
    function setNotification(msg){ const el=document.getElementById('notification'); el.textContent=msg||''; el.style.display=msg?'block':'none'; }

    function updateRekapTable(){
      const tbody=document.querySelector('#rekapTable tbody'); tbody.innerHTML='';
      const filter=filterText.trim().toLowerCase();
      for(const kode in dataUser){
        const user=dataUser[kode], info=databaseOperator[kode]||{nama:'-', contract:'-'};
        if(filter && !(kode+' '+info.nama).toLowerCase().includes(filter)) continue;
        tbody.innerHTML += `<tr>
          <td>${kode}</td>
          <td>${info.nama}</td>
          <td>${info.contract}</td>
          <td>${user.sedangIstirahat?'Istirahat':'Kembali'}</td>
          <td>${user.masuk?formatTime(user.masuk):''}</td>
          <td>${user.selesai?formatTime(user.selesai):''}</td>
          <td>${user.durasi?formatDurasi(user.durasi):''}</td>
        </tr>`;
      }
    }

    async function fetchDataOnline(){
      try{
        const res = await fetch(API_URL+"?action=get");
        const json = await res.json();
        json.forEach(u=>{
          dataUser[u.OpsID] = {
            masuk: u.Mulai ? new Date(u.Mulai) : null,
            selesai: u.Selesai ? new Date(u.Selesai) : null,
            durasi: u.Durasi ? parseInt(u.Durasi) : null,
            sedangIstirahat: u.Status === "Istirahat"
          };
          databaseOperator[u.OpsID] = {nama: u.Nama, contract: u.Contract};
        });
        updateRekapTable();
      }catch(err){ console.error("Fetch data online error:", err); }
    }

    async function saveToOnline(u){
      try{
        await fetch(API_URL,{
          method:"POST",
          body: JSON.stringify({action:"addOrUpdate", data:u}),
          headers: {"Content-Type":"application/json"}
        });
      }catch(err){ console.error("Save to online error:", err); }
    }

    // =============== SCAN OPSID ==================
    document.getElementById('barcode').addEventListener('keypress',function(e){
      if(e.key==='Enter'){ scanOpsID(this.value.trim()); this.value=''; this.focus(); }
    });

    function scanOpsID(kode){
      setNotification('');
      if(!kode) return;
      const info = databaseOperator[kode] || {nama:'-', contract:'-'};
      const now = new Date();
      if(!dataUser[kode]){
        dataUser[kode] = {masuk:now, sedangIstirahat:true};
        document.getElementById('status').innerHTML=`OpsID: ${kode}<br>Nama: ${info.nama}<br>Contract: ${info.contract}<br>Status: Istirahat<br>Mulai: ${formatTime(now)}`;
      } else if(dataUser[kode].sedangIstirahat){
        const masuk=dataUser[kode].masuk, durasi=Math.floor((now-masuk)/1000);
        dataUser[kode].sedangIstirahat=false; dataUser[kode].selesai=now; dataUser[kode].durasi=durasi;
        let html=`OpsID: ${kode}<br>Nama: ${info.nama}<br>Contract: ${info.contract}<br>Status: Masuk Kembali<br>Selesai: ${formatTime(now)}<br>Durasi: ${formatDurasi(durasi)}`;
        if(durasi>batasDetik){html+=`<div style="color:#a10000;margin-top:6px;">⚠️ Melebihi batas istirahat: ${formatDurasi(durasi-batasDetik)}</div>`; setNotification(`⚠️ OpsID ${kode} melebihi batas istirahat!`);} else setNotification('');
        document.getElementById('status').innerHTML=html;
      }
      updateRekapTable();
      saveToOnline({
        OpsID: kode,
        Nama: info.nama,
        Contract: info.contract,
        Status: dataUser[kode].sedangIstirahat?'Istirahat':'Kembali',
        Mulai: dataUser[kode].masuk,
        Selesai: dataUser[kode].selesai || '',
        Durasi: dataUser[kode].durasi || 0
      });
    }

    // =================== SEARCH & FILTER =================
    const searchInput = document.getElementById('searchInput');
    document.getElementById('btnCari').addEventListener('click', ()=>{ filterText=searchInput.value; updateRekapTable(); });
    searchInput.addEventListener('keypress', e=>{ if(e.key==='Enter'){ document.getElementById('btnCari').click(); } });

    document.getElementById('btnFilterOverBatas').addEventListener('click', ()=>{
      const batasDurasi = 4200;
      const tbody = document.querySelector('#rekapTable tbody');
      tbody.innerHTML='';
      for(const kode in dataUser){
        const user=dataUser[kode]; if(!user.durasi || user.durasi<=batasDurasi) continue;
        const info = databaseOperator[kode] || {nama:'-', contract:'-'};
        tbody.innerHTML += `<tr>
          <td>${kode}</td>
          <td>${info.nama}</td>
          <td>${info.contract}</td>
          <td>${user.sedangIstirahat?'Istirahat':'Kembali'}</td>
          <td>${user.masuk?formatTime(user.masuk):''}</td>
          <td>${user.selesai?formatTime(user.selesai):''}</td>
          <td>${user.durasi?formatDurasi(user.durasi):''}</td>
        </tr>`;
      }
    });

    document.getElementById('btnResetData').addEventListener('click',()=>{
      if(confirm('Yakin ingin menghapus data operator yang sudah kembali?')){
        for(const k in dataUser){ if(dataUser[k].sedangIstirahat===false){ delete dataUser[k]; } }
        setNotification('Data operator yang sudah kembali telah direset.');
        document.getElementById('status').innerHTML='Status: Menunggu scan';
        updateRekapTable();
      }
    });

    // ================= DOWNLOAD =================
    document.getElementById('btnDownloadTemplate').addEventListener('click', ()=>{
      const ws=XLSX.utils.json_to_sheet([{OpsID:'',Nama:'',Contract:''}]);
      const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'TemplateOperator'); XLSX.writeFile(wb,'TemplateOperator.xlsx');
    });

    document.getElementById('btnDownloadRekap').addEventListener('click', ()=>{
      const arr=[];
      for(const k in dataUser){
        const u=dataUser[k], i=databaseOperator[k]||{nama:'-', contract:'-'};
        arr.push({OpsID:k,Nama:i.nama,Contract:i.contract,Status:u.sedangIstirahat?'Istirahat':'Kembali',Mulai:u.masuk?formatTime(u.masuk):'',Selesai:u.selesai?formatTime(u.selesai):'',Durasi:u.durasi?formatDurasi(u.durasi):''});
      }
      const ws=XLSX.utils.json_to_sheet(arr);
      const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'RekapOperator'); XLSX.writeFile(wb,'RekapOperator.xlsx');
    });

    // ================= INITIAL LOAD =================
    fetchDataOnline();
  </script>
</body>
</html>
