<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Istirahat Operator Rancaekek 2 DC </title>
  <style>
    body {
      font-family: 'Segoe UI', Calibri, sans-serif;
      margin: 0;
      background: #0d0d0d;
      color: #f5f5f5;
      font-size: 16px;
    }
    .header {
      width: 100%;
      background: linear-gradient(90deg, #1a1a1a, #333333);
      padding: 20px 50px;
      border-bottom: 2px solid #bfa64b;
      font-size: 20px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #f5d000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.7);
      box-sizing: border-box;
    }
    .header-right {
      display: flex;
      gap: 15px;
      align-items: center;
      padding-right: 50px; /* sama dengan padding header dan bawah */
      box-sizing: border-box;
    }
    button {
      padding: 10px 20px; font-size: 16px; border-radius: 10px; border: none;
      cursor: pointer; font-weight: bold; transition: all 0.3s ease;
      box-shadow: 0 4px 6px rgba(0,0,0,0.5); color: #fff;
    }
    button:focus { outline: 3px solid #f5d000; }
    #btnDownloadTemplate { background-color: #bfa64b; }
    #btnDownloadTemplate:hover { background-color: #e6c94d; }
    #btnImportData { background-color: #444; }
    #btnImportData:hover { background-color: #666; }
    #btnDownloadRekap { background-color: #d4af37; color:#000; }
    #btnDownloadRekap:hover { background-color: #ffd700; }
    #btnResetData { background-color: #b00000; color: #fff; }
    #btnResetData:hover { background-color: #e60000; }
    #btnCari { background-color: #1e90ff; }
    #btnCari:hover { background-color: #3aa0ff; }
    #btnFilterOverBatas { background-color: #ff8c00; }
    #btnFilterOverBatas:hover { background-color: #ffa500; }
    .container { display: flex; height: calc(100vh - 80px); }
    .left, .right { flex: 1; padding: 50px; display: flex; flex-direction: column; }
    .left { background: #1a1a1a; border-right: 2px solid #bfa64b; }
    input[type=text] {
      padding: 14px; width: 100%; border-radius: 10px; border: 1px solid #555;
      background: #0d0d0d; color: #f5f5f5; font-size: 16px;
    }
    .notification {
      margin-top: 15px; font-size: 15px; color: #ffd700;
      min-height: 40px; white-space: pre-wrap; font-weight: bold;
      background: #333; border-radius: 8px; padding: 10px 15px;
      border: 1px solid #bfa64b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
    }
    .status { margin-top: 25px; font-size: 16px; line-height: 1.8; }
    .table-header-bar {
      display: flex; justify-content: flex-end; align-items: center; gap: 12px;
      margin-bottom: 10px;
      padding-right: 50px; /* sama dengan padding kanan header */
      box-sizing: border-box;
    }
    .table-header-bar input[type=text] { max-width: 250px; }
    table {
      width: 100%; border-collapse: collapse; font-size: 14px; margin-top: 5px;
      color: #f5f5f5; background: #1a1a1a;
    }
    table, th, td { border: 1px solid #bfa64b; }
    th { padding: 10px; text-align: left; background: #333; color: #ffd700; }
    td { padding: 8px; text-align: left; background: #1a1a1a; }
    tr:hover td { background: #2a2a2a; }
    h3 { color: #ffd700; font-weight: bold; margin-bottom: 15px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">Istirahat Operator Rancaekek 2 DC </div>
    <div class="header-right">
      <button id="btnDownloadTemplate" title="Download Template Excel">Download Template</button>
      <button id="btnImportData" title="Import Data Excel">Import Data</button>
      <button id="btnDownloadRekap" title="Download Rekap Excel">Download Rekap</button>
      <input type="file" id="importFileInput" style="display:none" accept=".xlsx,.xls" />
    </div>
  </div>

  <div class="container">
    <div class="left">
      <label for="barcode">Scan OpsID</label>
      <input type="text" id="barcode" placeholder="Scan di sini..." autofocus autocomplete="off" />
      <div class="notification" id="notification"></div>
      <div class="status" id="status">Status: Menunggu scan</div>
    </div>

    <div class="right">
      <div class="table-header-bar">
        <input type="text" id="searchInput" placeholder="Cari OpsID atau Nama..." />
        <button id="btnCari">Cari</button>
        <button id="btnFilterOverBatas" title="Tampilkan operator > 1 jam 10 menit">Filter > 1 jam 10 menit</button>
        <button id="btnResetData" title="Reset Daftar Istirahat">Reset Daftar</button>
      </div>
      <h3>Daftar Operator Istirahat</h3>
      <table id="rekapTable" aria-label="Daftar rekap operator">
        <thead>
          <tr>
            <th>OpsID</th>
            <th>Nama</th>
            <th>Contract</th>
            <th>Status</th>
            <th>Mulai</th>
            <th>Selesai</th>
            <th>Durasi</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import {
    getFirestore, collection, addDoc, onSnapshot, doc, updateDoc
  } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA5ONv6XowT3EJLE3Rsyq4INgCvC-4AhL0",
    authDomain: "mhmdlysprjct.firebaseapp.com",
    projectId: "mhmdlysprjct",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.fb = { collection, addDoc, onSnapshot, doc, updateDoc };
    
    
    let databaseOperator = {}, dataUser = {}, batasDetik = 3900, filterText = '';

  // 🔥 FIREBASE LOAD (TAMBAHAN)
function loadDataFirebase(){
  const q = fb.collection(db, "istirahat");

  fb.onSnapshot(q, (snapshot) => {
    dataUser = {};

    snapshot.forEach(docSnap => {
      const d = docSnap.data();

      dataUser[d.opsId] = {
        id: docSnap.id,
        masuk: d.masuk ? new Date(d.masuk.seconds * 1000) : null,
        selesai: d.selesai ? new Date(d.selesai.seconds * 1000) : null,
        durasi: d.durasi || null,
        sedangIstirahat: d.sedangIstirahat
      };
    });

    updateRekapTable();
  });
}
    function formatTime(d){ return d.toTimeString().slice(0,8); }
    function formatDurasi(s){ return [Math.floor(s/3600).toString().padStart(2,'0'), Math.floor((s%3600)/60).toString().padStart(2,'0'), (s%60).toString().padStart(2,'0')].join(':'); }
    function setNotification(msg){ const el = document.getElementById('notification'); el.textContent = msg||''; el.style.display = msg?'block':'none'; }

    function updateRekapTable(){
      const tbody = document.querySelector('#rekapTable tbody'); tbody.innerHTML='';
      const filter = filterText.trim().toLowerCase();
      for(const kode in dataUser){
        const user=dataUser[kode], info=databaseOperator[kode]||{nama:'-', contract:'-'};
        if(filter && !(kode+' '+info.nama).toLowerCase().includes(filter)) continue;
        tbody.innerHTML += `<tr>
          <td>${kode}</td>
          <td>${info.nama}</td>
          <td>${info.contract}</td>
          <td>${user.sedangIstirahat?'Istirahat':'Kembali'}</td>
          <td>${user.masuk?formatTime(user.masuk):''}</td>
          <td>${user.selesai?formatTime(user.selesai):''}</td>
          <td>${user.durasi?formatDurasi(user.durasi):''}</td>
        </tr>`;
      }
    }

    function downloadRekap(){
      const arr=[]; for(const k in dataUser){const u=dataUser[k],i=databaseOperator[k]||{nama:'-',contract:'-'}; arr.push({OpsID:k,Nama:i.nama,Contract:i.contract,Status:u.sedangIstirahat?'Istirahat':'Kembali',Mulai:u.masuk?formatTime(u.masuk):'',Selesai:u.selesai?formatTime(u.selesai):'',Durasi:u.durasi?formatDurasi(u.durasi):''});}
      const ws=XLSX.utils.json_to_sheet(arr), wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'RekapOperator'); XLSX.writeFile(wb,'RekapOperator.xlsx');
    }
    function downloadTemplate(){
      const ws=XLSX.utils.json_to_sheet([{OpsID:'',Nama:'',Contract:''}]), wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'TemplateOperator'); XLSX.writeFile(wb,'TemplateOperator.xlsx');
    }
    function importDataFromFile(file){
      const reader=new FileReader(); reader.onload=e=>{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const jsonData=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        databaseOperator={}; window.databaseOperatorLower={};
        jsonData.forEach(item=>{if(item.OpsID&&item.Nama&&item.Contract){const k=item.OpsID.trim(); databaseOperator[k]={nama:item.Nama.trim(),contract:item.Contract.trim()}; window.databaseOperatorLower[k.toLowerCase()]=k;}});
        setNotification('Data berhasil diimport. Total operator: '+Object.keys(databaseOperator).length); updateRekapTable();
      }; reader.readAsArrayBuffer(file);
    }

    // Event Listener
    document.getElementById('btnDownloadRekap').addEventListener('click', downloadRekap);
    document.getElementById('btnDownloadTemplate').addEventListener('click', downloadTemplate);
    document.getElementById('btnImportData').addEventListener('click', ()=>document.getElementById('importFileInput').click());
    document.getElementById('importFileInput').addEventListener('change', ()=>{ if(document.getElementById('importFileInput').files.length>0){ importDataFromFile(document.getElementById('importFileInput').files[0]); document.getElementById('importFileInput').value=''; }});

    document.getElementById('barcode').addEventListener('keypress',function(e){
      if(e.key==='Enter'){ scanOpsID(this.value.trim()); this.value=''; this.focus(); }
    });

    async function scanOpsID(kodeRaw){
      setNotification(''); if(!kodeRaw) return;
      const kodeAsli=window.databaseOperatorLower?kodeRaw.toLowerCase() in window.databaseOperatorLower ? window.databaseOperatorLower[kodeRaw.toLowerCase()]:undefined:undefined;
      if(!kodeAsli){ setNotification('OpsID tidak terdaftar!'); return; }
      const dataOps=databaseOperator[kodeAsli], now=new Date(), nama=dataOps.nama, contract=dataOps.contract;
      if(!dataUser[kodeAsli]){
        // 🔥 FIREBASE SAVE
await fb.addDoc(fb.collection(db, "istirahat"), {
  opsId: kodeAsli,
  nama,
  contract,
  masuk: now,
  sedangIstirahat: true
});
        document.getElementById('status').innerHTML=`OpsID: ${kodeAsli}<br>Nama: ${nama}<br>Contract: ${contract}<br>Status: Istirahat<br>Mulai: ${formatTime(now)}`;
      } else if(dataUser[kodeAsli].sedangIstirahat){
        const masuk=dataUser[kodeAsli].masuk, durasi=Math.floor((now-masuk)/1000);

  // 🔥 FIREBASE UPDATE
await fb.updateDoc(fb.doc(db, "istirahat", dataUser[kodeAsli].id), {
  selesai: now,
  durasi: durasi,
  sedangIstirahat: false
});
        let html=`OpsID: ${kodeAsli}<br>Nama: ${nama}<br>Contract: ${contract}<br>Status: Masuk Kembali<br>Selesai: ${formatTime(now)}<br>Durasi: ${formatDurasi(durasi)}`;
        if(durasi>batasDetik){html+=`<div style="color:#a10000;margin-top:6px;">⚠️ Melebihi batas istirahat: ${formatDurasi(durasi-batasDetik)}</div>`; setNotification(`⚠️ OpsID ${kodeAsli} melebihi batas istirahat!`);} else setNotification('');
        document.getElementById('status').innerHTML=html;
      } else { const u=dataUser[kodeAsli]; if(u.selesai){ setNotification(`⚠️ Operator sudah beristirahat!\nOpsID: ${kodeAsli}\nNama: ${nama}\nContract: ${contract}\nJam Mulai: ${formatTime(u.masuk)}\nJam Selesai: ${formatTime(u.selesai)}\nDurasi: ${formatDurasi(u.durasi)}`); return;} else { dataUser[kodeAsli].masuk=now; dataUser[kodeAsli].sedangIstirahat=true; document.getElementById('status').innerHTML=`OpsID: ${kodeAsli}<br>Nama: ${nama}<br>Contract: ${contract}<br>Status: Istirahat<br>Mulai: ${formatTime(now)}`; } }
      updateRekapTable();
    }

    const searchInput=document.getElementById('searchInput');
    const btnCari=document.getElementById('btnCari');
    btnCari.addEventListener('click', ()=>{ filterText=searchInput.value; updateRekapTable(); });
    searchInput.addEventListener('keypress', e=>{ if(e.key==='Enter'){ btnCari.click(); } });

    document.getElementById('btnResetData').addEventListener('click',()=>{
      if(confirm('Yakin ingin menghapus data operator yang sudah kembali (status selesai istirahat)?')){
        for(const k in dataUser){ if(dataUser[k].sedangIstirahat===false){ delete dataUser[k]; } }
        setNotification('Data operator yang sudah kembali telah direset.');
        document.getElementById('status').innerHTML='Status: Menunggu scan';
        updateRekapTable();
  // 🔥 FIREBASE INIT
loadDataFirebase();
      }
    });

    // Tombol filter > 1 jam 10 menit
    document.getElementById('btnFilterOverBatas').addEventListener('click', ()=>{
      const batasDurasi = 4200; // 1 jam 10 menit
      const tbody = document.querySelector('#rekapTable tbody');
      tbody.innerHTML = '';
      for(const kode in dataUser){
        const user = dataUser[kode];
        if(!user.durasi || user.durasi <= batasDurasi) continue;
        const info = databaseOperator[kode] || {nama:'-', contract:'-'};
        tbody.innerHTML += `<tr>
          <td>${kode}</td>
          <td>${info.nama}</td>
          <td>${info.contract}</td>
          <td>${user.sedangIstirahat?'Istirahat':'Kembali'}</td>
          <td>${user.masuk?formatTime(user.masuk):''}</td>
          <td>${user.selesai?formatTime(user.selesai):''}</td>
          <td>${user.durasi?formatDurasi(user.durasi):''}</td>
        </tr>`;
      }
    });

    // Contoh data awal
    databaseOperator={"Ops286033":{nama:"Andrea Gian Renaldy",contract:"Dedicated Vendor - NEXUS"},"Ops1799286":{nama:"Ikhsan Maulana",contract:"DEDICATED NEK"}};
    window.databaseOperatorLower={}; Object.keys(databaseOperator).forEach(k=>window.databaseOperatorLower[k.toLowerCase()]=k);
    updateRekapTable();
  </script>
</body>
</html>
